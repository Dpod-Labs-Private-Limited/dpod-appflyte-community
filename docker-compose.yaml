x-common-env: &common-env
  LICENSE_TOKEN: ${LICENSE_TOKEN}
  LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY}
  ROOT_USER_TOKEN: ${ROOT_USER_TOKEN}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  MONGODB_URI: "mongodb://admin:admin123456@mongodb:27017/?authSource=admin&directConnection=true"
  MONGO_DB_DATABASE: extraction-analytics
  AWS_ACCESS_KEY_ID: admin
  AWS_SECRET_ACCESS_KEY: admin123
  AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
  LOCAL_TESTING_ENABLED: "true"
  S3_BUCKET_NAME: "dpod-aws-s3"
  APPFLYTE_AUTHORIZATION_URL: "appflyte-authorization-service:50052"
  REDIS_HOST: appflyte-redis
  REDIS_PORT: "6379"
  DEPLOYMENT_MODE: community
  DYNAMODB_ENDPOINT_URL: http://dynamodb:8000
  DYNAMODB_ACCESS_KEY: "admin"
  DYNAMODB_SECRET_KEY: "admin123"
  MINIO_ENDPOINT: http://minio:9000
  MINIO_PUBLIC_ENDPOINT: "http://minio.localhost:8080"
  MINIO_ACCESS_KEY: admin
  MINIO_SECRET_KEY: admin123

